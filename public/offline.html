<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Offline — DisciplineOS</title>
  <link rel="icon" href="/icon-192.png" />
  <style>
    :root { color-scheme: dark; }
    html,body { margin:0; height:100%; background:#0a0f1e; color:#e2e8f0; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Inter, sans-serif; }
    main { min-height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center; }
    .logo { width:88px; height:88px; border-radius:22px; }
    h1 { font-size:1.5rem; margin:20px 0 8px; }
    p { color:#94a3b8; max-width:32ch; line-height:1.5; }
    button { margin-top:24px; background:#10b981; color:#0a0f1e; border:0; padding:12px 22px; border-radius:12px; font-weight:600; cursor:pointer; }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="/icon-192.png" alt="DisciplineOS" width="88" height="88" />
    <h1>You're offline</h1>
    <p>Your discipline doesn't pause. Cached pages still work — reconnect to sync new data.</p>
    <button onclick="location.reload()">Try again</button>
  </main>
</body>
</html>
